<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTE VILLAGE |Village Directory</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Chilanka&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="glass-background"></div>

    <header class="main-header">
        <div class="header-content">
            <h1 class="logo-malayalam">എന്റെ വില്ലേജ്</h1>
            <p class="logo-sub-malayalam">ആലപ്പുഴ ജില്ലയിലെ വില്ലേജ് ഓഫീസുകളുടെ ഒരു കുട്ടി ഡാറ്റാബേസ്</p>
        </div>
    </header>

    <main class="container">
        <section class="stats-ribbon">
            <div class="stat-card">
                <i data-lucide="building-2"></i>
                <div>
                    <span class="stat-value" id="total-villages">0</span>
                    <span class="stat-label">Villages</span>
                </div>
            </div>
            <div class="stat-card">
                <i data-lucide="layers"></i>
                <div>
                    <span class="stat-value" id="total-taluks">0</span>
                    <span class="stat-label">Taluks</span>
                </div>
            </div>
            <div class="stat-card">
                <i data-lucide="shield-check"></i>
                <div>
                    <span class="stat-value">2</span>
                    <span class="stat-label">RDOs</span>
                </div>
            </div>
        </section>

        <section class="controls">
            <div class="search-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="search-bar" placeholder="Search village, officer, mobile..." autocomplete="off">
            </div>

            <div class="filter-group">
                <div class="select-wrapper">
                    <i data-lucide="filter" class="filter-icon"></i>
                    <select id="taluk-dropdown">
                        <option value="">All Taluks</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="loader" id="loading-message">
            <div class="spinner"></div>
            <p>Gathering data...</p>
        </section>

        <section class="card-grid" id="village-list">
            <!-- Cards will be injected here -->
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 KSITM Alappuzha | Data sourced from Google Sheets</p>
    </footer>

    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
